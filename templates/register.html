<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Registration</title>
<style>
/* ===== Base Styling ===== */
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #A3D1C6, #d0f0ea);
    overflow: hidden;
}

/* ===== Background Glow Effects ===== */
body::before, body::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    z-index: 0;
}
body::before {
    width: 400px;
    height: 400px;
    background: rgba(0, 121, 107, 0.3);
    top: 5%;
    left: 10%;
}
body::after {
    width: 400px;
    height: 400px;
    background: rgba(0, 0, 255, 0.25);
    bottom: 10%;
    right: 10%;
}

/* ===== Form Container ===== */
.form-container {
    position: relative;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    padding: 45px 50px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    text-align: center;
    max-width: 800px;
    width: 100%;
    z-index: 1;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}
.form-container:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 35px rgba(0,0,0,0.2);
}

/* ===== Header ===== */
h1 {
    font-size: 2rem;
    color: blue;
    margin-bottom: 25px;
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(0, 0, 255, 0.2);
}

/* ===== Form Grid Layout ===== */
form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 25px;
    width: 100%;
}

/* ===== Label Styling ===== */
label {
    text-align: left;
    font-size: 1rem;
    color: #004d40;
    font-weight: 600;
}

/* ===== Input and Select Fields ===== */
input, select {
    padding: 12px;
    border: 2px solid #00796b;
    border-radius: 10px;
    font-size: 1rem;
    outline: none;
    transition: all 0.3s ease;
    width: 100%;
    background-color: #f9fdfc;
    box-sizing: border-box;
}
input:focus, select:focus {
    border-color: blue;
    box-shadow: 0 0 8px rgba(0,121,107,0.4), 0 0 8px rgba(0,0,255,0.2);
    background-color: #ffffff;
}

/* ===== Submit Button ===== */
input[type="submit"] {
    background: linear-gradient(90deg, blue, #004d40);
    color: white;
    border: none;
    padding: 14px;
    font-size: 1.1rem;
    cursor: pointer;
    border-radius: 10px;
    font-weight: 600;
    transition: all 0.3s ease;
    grid-column: span 2;
    max-width: 250px;
    margin: 15px auto 0;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}
input[type="submit"]:hover {
    background: linear-gradient(90deg, #004d40, blue);
    transform: scale(1.03);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

/* ===== Footer Text ===== */
p {
    font-size: 1rem;
    color: #004d40;
    margin-top: 20px;
}
a {
    color: blue;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s ease;
}
a:hover {
    text-decoration: underline;
    color: #004d40;
}

/* ===== Responsive Design ===== */
@media (max-width: 768px) {
    .form-container {
        padding: 35px 25px;
    }
    form {
        grid-template-columns: 1fr;
    }
    input[type="submit"] {
        grid-column: 1;
        width: 100%;
        max-width: none;
    }
    h1 {
        font-size: 1.6rem;
    }
    label, input, select {
        font-size: 0.95rem;
    }
}
</style>
</head>
<body>

<div class="form-container">
    <h1>Employee Registration</h1>
    <form action="{{ url_for('register') }}" method="POST">
        <label for="name">Full Name:</label>
        <input type="text" id="profile_name" name="name" placeholder="Enter your full name" required>

        <label for="age">Age:</label>
        <input type="number" id="profile_age" name="age" placeholder="Enter your age" required>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
            <option value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>

        <label for="address">Address:</label>
        <input type="text" id="address" name="address" placeholder="Enter your address" required>

        <label for="status">Status:</label>
        <input type="text" id="status" name="status" placeholder="e.g., Active" required>

        <label for="contact">Contact Number:</label>
        <input type="text" id="contact" name="contact" placeholder="Enter contact number" required>

        <label for="position">Work Position:</label>
        <select id="position" name="position" required>
            <option value="">Select Position</option>
            <option value="Employee">Employee</option>
        </select>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter email" required>

        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Create username" required>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Create password" required>

        <label for="con_password">Confirm Password:</label>
        <input type="password" id="con_password" name="con_password" placeholder="Confirm password" required>

        <input type="submit" value="Register">
    </form>
    <p>Already have an account? <a href="/">Login</a></p>
</div>

</body>
</html>
