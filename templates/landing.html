<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
/* --- Base Styling --- */
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #A3D1C6, #d0f0ea);
    overflow: hidden;
}

/* --- Animated Gradient Glow --- */
body::before {
    content: '';
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,121,107,0.3), transparent 70%);
    top: 10%;
    left: 10%;
    filter: blur(100px);
    z-index: 0;
}
body::after {
    content: '';
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,0,255,0.25), transparent 70%);
    bottom: 10%;
    right: 10%;
    filter: blur(120px);
    z-index: 0;
}

/* --- Login Card --- */
.login-container {
    position: relative;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(8px);
    padding: 45px 35px;
    border-radius: 18px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    width: 100%;
    max-width: 400px;
    text-align: center;
    z-index: 1;
    transition: transform 0.4s ease, box-shadow 0.4s ease;
}
.login-container:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
}

/* --- Logo --- */
.login-container img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin-bottom: 20px;
    box-shadow: 0 0 12px rgba(0, 121, 107, 0.4);
}

/* --- Title --- */
.login-container h1 {
    font-size: 2rem;
    color: blue;
    margin-bottom: 25px;
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(0, 0, 255, 0.2);
}

/* --- Form Layout --- */
form {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

/* --- Label --- */
label {
    font-size: 1rem;
    text-align: left;
    color: #00796b;
    font-weight: 600;
}

/* --- Input Fields --- */
input[type="text"],
input[type="password"] {
    padding: 12px;
    border: 2px solid #00796b;
    border-radius: 10px;
    font-size: 1rem;
    outline: none;
    background-color: #f9fdfc;
    transition: all 0.3s ease;
}
input[type="text"]:focus,
input[type="password"]:focus {
    border-color: blue;
    box-shadow: 0 0 10px rgba(0, 121, 107, 0.4), 0 0 10px rgba(0, 0, 255, 0.2);
    background-color: #ffffff;
}

/* --- Button --- */
input[type="submit"] {
    padding: 12px;
    background: linear-gradient(90deg, blue, #004d40);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1.05rem;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
}
input[type="submit"]:hover {
    background: linear-gradient(90deg, #004d40, blue);
    transform: scale(1.03);
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
}

/* --- Footer Text --- */
p {
    font-size: 0.95rem;
    margin-top: 20px;
    color: #004d40;
}
a {
    color: blue;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s ease;
}
a:hover {
    text-decoration: underline;
    color: #004d40;
}

/* --- Responsive Design --- */
@media (max-width: 480px) {
    .login-container {
        padding: 30px 25px;
    }
    .login-container img {
        width: 85px;
        height: 85px;
    }
    .login-container h1 {
        font-size: 1.6rem;
    }
    label, input, input[type="submit"], p {
        font-size: 0.9rem;
    }
}
</style>
</head>
<body>
<div class="login-container">
    <img src="{{ url_for('static', filename='img/image.jfif') }}" alt="Profile Picture">
    <h1>Login</h1>
    <form action="{{ url_for('landing') }}" method="POST">
        <label for="email">Username:</label>
        <input type="text" id="email" name="username" placeholder="Enter your username" required>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        
        <input type="submit" value="Login">
    </form>
    <p>Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
</div>
</body>
</html>
